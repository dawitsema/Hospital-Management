name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Server install and lint
        working-directory: server
        run: |
          npm ci
          npm run lint

      - name: Client install and build
        working-directory: client
        run: |
          npm ci
          npm run build
